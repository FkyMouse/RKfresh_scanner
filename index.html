<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Камера Web App</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f17;
      color: #e0e0ff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #videoContainer {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* зеркальное отражение как в селфи */
    }
    .controls {
      padding: 16px;
      background: rgba(20, 20, 40, 0.85);
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    button {
      padding: 14px 28px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      background: #0066ff;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      touch-action: manipulation;
    }
    button:hover {
      background: #0055dd;
    }
    button:active {
      transform: scale(0.96);
    }
    button:disabled {
      background: #444;
      color: #888;
    }
    #status {
      text-align: center;
      padding: 8px;
      font-size: 15px;
      color: #a0a0ff;
    }
    .small-hint {
      font-size: 13px;
      opacity: 0.7;
      text-align: center;
      padding: 0 16px 12px;
    }
  </style>
</head>
<body>

  <div id="videoContainer">
    <video id="video" autoplay playsinline></video>
  </div>

  <div id="status">Нажмите кнопку, чтобы начать</div>

  <div class="controls">
    <button id="btnFront">📸 Фронтальная</button>
    <button id="btnBack">🔙 Задняя</button>
    <button id="btnStop" disabled>⏹ Стоп</button>
  </div>

  <div class="small-hint">
    Telegram Web App • GitHub Pages • 2025–2026
  </div>

  <script>
    // =============================================
    //  Основные переменные
    // =============================================
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btnFront = document.getElementById('btnFront');
    const btnBack  = document.getElementById('btnBack');
    const btnStop  = document.getElementById('btnStop');

    let currentStream = null;
    let currentFacingMode = 'user'; // 'user' или 'environment'

    // =============================================
    //  Основная функция запуска камеры
    // =============================================
    async function startCamera(facingMode) {
      // останавливаем предыдущий поток, если был
      stopCamera();

      currentFacingMode = facingMode;

      try {
        const constraints = {
          video: {
            facingMode: { exact: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;

        status.textContent = facingMode === 'user' 
          ? 'Фронтальная камера активна' 
          : 'Задняя камера активна';

        btnFront.disabled = (facingMode === 'user');
        btnBack.disabled  = (facingMode === 'environment');
        btnStop.disabled  = false;

      } catch (err) {
        console.error("Ошибка доступа к камере:", err);

        let msg = "Не удалось открыть камеру";

        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          msg = "Доступ к камере запрещён. Разрешите в настройках Telegram / браузера.";
        } else if (err.name === 'OverconstrainedError') {
          msg = "Камера с нужным направлением не найдена";
        } else if (err.name === 'NotFoundError') {
          msg = "Камера не обнаружена на устройстве";
        }

        status.textContent = msg;
        resetButtons();
      }
    }

    function stopCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
        video.srcObject = null;
      }
    }

    function resetButtons() {
      btnFront.disabled = false;
      btnBack.disabled  = false;
      btnStop.disabled  = true;
    }

    // =============================================
    //  Обработчики кнопок
    // =============================================
    btnFront.addEventListener('click', () => startCamera('user'));
    btnBack.addEventListener('click',  () => startCamera('environment'));

    btnStop.addEventListener('click', () => {
      stopCamera();
      status.textContent = "Камера остановлена";
      resetButtons();
    });

    // Автозапуск фронтальной камеры (удобно для Telegram Web App)
    window.addEventListener('load', () => {
      // небольшая задержка — иногда Telegram ещё не готов
      setTimeout(() => {
        startCamera('user');
      }, 400);
    });

    // Для отладки в обычном браузере можно раскомментировать:
    // startCamera('user');
  </script>
</body>
</html>

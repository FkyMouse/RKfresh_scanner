<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QR / Камера — Telegram Web App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --tg-theme-bg-color: #000;
      --tg-theme-text-color: #ffffff;
      --tg-theme-button-color: #2481cc;
      --tg-theme-button-text-color: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    #reader {
      position: fixed;
      inset: 0;
      background: #111;
    }

    #status {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      text-align: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 17px;
      z-index: 20;
      pointer-events: none;
    }

    #controls {
      position: fixed;
      bottom: 90px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 0 20px;
      z-index: 20;
      flex-wrap: wrap;
    }

    #main-btn-container {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      padding: 0 20px;
      z-index: 25;
    }

    button {
      padding: 14px 28px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      color: white;
      background: #333;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover, button:active { background: #555; }

    button.primary {
      background: var(--tg-theme-button-color);
    }

    button.primary:hover, button.primary:active {
      background: #1a6eb3;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: #00c853;
      opacity: 0;
      pointer-events: none;
      z-index: 15;
      transition: opacity 0.4s;
    }

    .flash.active { opacity: 0.7; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="reader"></div>

  <div id="status">Запуск камеры…</div>

  <div id="controls">
    <button id="btnFront">Фронтальная</button>
    <button id="btnBack" class="primary">Задняя</button>
    <button id="btnStop">Выключить</button>
  </div>

  <div id="main-btn-container" class="hidden">
    <button id="mainActionBtn" class="primary" style="width:100%; padding:16px 24px; font-size:18px;">
      Отправить результат
    </button>
  </div>

  <div class="flash" id="flash"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();

    const status = document.getElementById("status");
    const flash  = document.getElementById("flash");
    const btnFront = document.getElementById("btnFront");
    const btnBack  = document.getElementById("btnBack");
    const btnStop  = document.getElementById("btnStop");
    const mainBtnContainer = document.getElementById("main-btn-container");
    const mainActionBtn    = document.getElementById("mainActionBtn");

    let scanner = null;
    let currentStream = null;
    let lastResult = null;
    let isScanning = false;

    // ────────────────────────────────────────────────
    //  Вспомогательные функции
    // ────────────────────────────────────────────────
    function flashEffect() {
      flash.classList.add("active");
      setTimeout(() => flash.classList.remove("active"), 400);
    }

    function stopScanner() {
      if (scanner) {
        scanner.stop().catch(()=>{});
        scanner.clear();
        scanner = null;
      }
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }
      isScanning = false;
      mainBtnContainer.classList.add("hidden");
      status.textContent = "Камера выключена";
      btnStop.classList.add("hidden");
    }

    async function startScanner(facingMode = "environment") {
      stopScanner(); // на всякий случай

      status.textContent = `Запуск ${facingMode === "user" ? "фронтальной" : "задней"} камеры…`;

      try {
        scanner = new Html5Qrcode("reader", {
          fps: 12,
          qrbox: { width: 280, height: 180 },
          aspectRatio: 1.777,           // ≈16:9
          disableFlip: facingMode === "user", // фронталку не зеркалим
          rememberLastUsedCamera: true,
          formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.UPC_A,
            // можно добавить ещё: PDF417, DATA_MATRIX и т.д.
          ]
        });

        const cams = await Html5Qrcode.getCameras();
        let deviceId = null;

        if (cams && cams.length > 0) {
          // пытаемся выбрать нужную камеру
          const targetLabel = facingMode === "user" ? "front" : "back";
          const found = cams.find(c =>
            c.label.toLowerCase().includes(targetLabel) ||
            c.label.toLowerCase().includes(facingMode)
          );
          if (found) deviceId = found.id;
          else deviceId = cams[0].id; // fallback
        }

        await scanner.start(
          deviceId || { facingMode },
          { fps: 12, qrbox: { width: 280, height: 180 } },
          (decodedText, decodedResult) => {
            if (lastResult === decodedText) return; // защита от дубликатов
            lastResult = decodedText;

            flashEffect();
            scanner.stop().catch(()=>{});

            status.innerHTML = `Найдено:<br><b>${decodedText}</b>`;
            tg.MainButton.setText(`Отправить: ${decodedText.slice(0,30)}${decodedText.length>30?"…":""}`);
            tg.MainButton.show();

            mainBtnContainer.classList.remove("hidden");
            mainActionBtn.textContent = `Отправить: ${decodedText.slice(0,24)}${decodedText.length>24?"…":""}`;
            mainActionBtn.onclick = () => {
              tg.sendData(decodedText);
              tg.close();
            };

            // можно раскомментировать автозакрытие через 4 секунды
            // setTimeout(() => { tg.sendData(decodedText); tg.close(); }, 4000);
          },
          (err) => {
            // тихо игнорируем ошибки сканирования (нет кода и т.п.)
          }
        );

        isScanning = true;
        status.textContent = "Наведите на QR-код или штрих-код";
        btnStop.classList.remove("hidden");

      } catch (err) {
        console.error(err);
        status.textContent = "Не удалось запустить камеру / сканер";
      }
    }

    // ────────────────────────────────────────────────
    //  Кнопки
    // ────────────────────────────────────────────────
    btnFront.onclick = () => startScanner("user");
    btnBack.onclick  = () => startScanner("environment");
    btnStop.onclick  = stopScanner;

    // Telegram MainButton как запасной вариант
    tg.MainButton.onClick(() => {
      if (lastResult) {
        tg.sendData(lastResult);
        tg.close();
      }
    });
    tg.MainButton.hide();

    // Автозапуск задней камеры
    setTimeout(() => {
      startScanner("environment");
    }, 500);

  </script>
</body>
</html>
